name: CI Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Strict Lockfile Sync
        run: npm ci
      - name: Run Code Linting
        run: npm run lint
      - name: Verify Production Build
        run: npm run build
